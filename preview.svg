<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a5a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Glow effect -->
  <circle cx="600" cy="315" r="400" fill="url(#glowGradient)"/>

  <!-- Main title -->
  <text x="600" y="280" font-size="140" font-weight="800" text-anchor="middle" fill="#4a9eff" font-family="Arial, sans-serif" letter-spacing="8">
    STRK
  </text>

  <!-- Subtitle -->
  <text x="600" y="350" font-size="32" font-weight="400" text-anchor="middle" fill="#8ca0c8" font-family="Arial, sans-serif" letter-spacing="6">
    MOD LOADER
  </text>

  <!-- Description -->
  <text x="600" y="410" font-size="18" text-anchor="middle" fill="#a0b0d8" font-family="Arial, sans-serif">
    One-time $6 purchase · Lifetime access
  </text>

  <!-- Border accent line -->
  <line x1="300" y1="450" x2="900" y2="450" stroke="#4a9eff" stroke-width="2" opacity="0.3"/>

  <!-- Bottom text -->
  <text x="600" y="530" font-size="20" text-anchor="middle" fill="#4a9eff" font-family="Arial, sans-serif" font-weight="600">
    The ultimate mod loader for Animal Company
  </text>
</svg>
